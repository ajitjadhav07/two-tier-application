<!DOCTYPE html>
<html>
<head>
  <title>Two-Tier App</title>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 0 20px; }
    h2 { color: #1e40af; }
    input { padding: 8px; margin-right: 8px; border: 1px solid #ccc; border-radius: 4px; width: 200px; }
    button { padding: 8px 16px; background: #3b82f6; color: white; border: none; border-radius: 4px; cursor: pointer; }
    ul { list-style: none; padding: 0; margin-top: 20px; }
    li { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
    .del { background: #ef4444; padding: 4px 10px; font-size: 12px; }
    .status { font-size: 12px; color: #6b7280; margin-top: 8px; }
  </style>
</head>
<body>
  <h2>Two-Tier App - User Manager</h2>
  <input id="nameInput" placeholder="Enter name" />
  <button onclick="addUser()">Add User</button>
  <p class="status" id="status">Loading...</p>
  <ul id="userList"></ul>

  <script>
    async function loadUsers() {
      try {
        const res = await fetch('/api/users');
        const users = await res.json();
        document.getElementById('status').textContent = `${users.length} users loaded`;
        document.getElementById('userList').innerHTML =
          users.map(u => `
            <li>${u.name}
              <button class="del" onclick="deleteUser(${u.id})">Delete</button>
            </li>`).join('');
      } catch(e) {
        document.getElementById('status').textContent = 'Error connecting to backend';
      }
    }

    async function addUser() {
      const name = document.getElementById('nameInput').value.trim();
      if (!name) return alert('Enter a name first');
      await fetch('/api/users', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name })
      });
      document.getElementById('nameInput').value = '';
      loadUsers();
    }

    async function deleteUser(id) {
      await fetch(`/api/users/${id}`, { method: 'DELETE' });
      loadUsers();
    }

    loadUsers();
  </script>
</body>
</html>
